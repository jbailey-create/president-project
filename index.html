<!DOCTYPE html>
<html>
<head>
<title>President Project Hub v11</title>

<style>
body{
font-family:Arial;
margin:0;
background:#1e3a8a;
color:white;
}

header{
background:#111;
padding:20px;
text-align:center;
}

nav{
background:#000;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}

section{
background:white;
color:black;
margin:20px auto;
padding:20px;
max-width:900px;
border-radius:10px;
}

.progress-bar{
background:#ccc;
height:20px;
}
.progress-fill{
background:#22c55e;
height:20px;
width:0%;
color:white;
text-align:center;
}
</style>

</head>

<body>

<header>
<h1>President Project Hub</h1>
</header>

<nav>
<a href="#checklist">Checklist</a>
<a href="#chatbot">Chatbot</a>
</nav>

<section id="checklist">
<h2>Checklist</h2>

<ul id="list">
<li><input type="checkbox" onchange="save()"> Thesis</li>
<li><input type="checkbox" onchange="save()"> Research</li>
<li><input type="checkbox" onchange="save()"> Slides</li>
<li><input type="checkbox" onchange="save()"> Practice</li>
</ul>

<div class="progress-bar">
<div id="bar" class="progress-fill">0%</div>
</div>
</section>

<section id="chatbot">
<h2>Coach Bot</h2>

<input id="msg">
<button onclick="bot()">Send</button>

<div id="chat"></div>
</section>

<script>

// PROGRESS SAVE
function save(){
let boxes=document.querySelectorAll('#list input');
boxes.forEach((cb,i)=>{
localStorage.setItem("box"+i,cb.checked);
});
load();
}

// LOAD
function load(){
let boxes=document.querySelectorAll('#list input');
let done=0;

boxes.forEach((cb,i)=>{
let saved=localStorage.getItem("box"+i);
if(saved==="true"){
cb.checked=true;
done++;
}
});

let pct=Math.round(done/boxes.length*100);
bar.style.width=pct+"%";
bar.innerText=pct+"%";
}

window.onload=load;

// SIMPLE BOT
function bot(){
let m=msg.value;
if(!m)return;

chat.innerHTML+="<p>You: "+m+"</p>";

let r="Be more specific.";
if(m.length>100) r="Put that in your own words.";

chat.innerHTML+="<p>Bot: "+r+"</p>";
msg.value="";
}

</script>

</body>
</html>
